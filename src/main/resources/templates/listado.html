<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Escuelas Municipales de Madrid</title>
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="text-primary">Escuelas de Arte - Madrid by JAGD@</h1>
            <span class="badge bg-secondary" th:text="${#lists.size(listaEscuelas)} + ' Centros'">0 Centros</span>
        </div>

        <div class="table-responsive shadow-sm bg-white p-3 rounded">
            <table class="table table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>Nombre</th>
                        <th>Dirección</th>
                        <th>Código Postal</th>
                        <th>Ubicación</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- th:each es el bucle que recorre la lista -->
                    <tr th:each="escuela : ${listaEscuelas}">
                        <td class="fw-bold" th:text="${escuela.nombre}">Nombre de la escuela</td>
                        <td th:text="${escuela.address.direccion}">Dirección</td>
                        <td>
                            <span class="badge rounded-pill text-bg-info" th:text="${escuela.address.codigoPostal}">28001</span>
                        </td>
                        <td>
                            <a th:href="'https://www.google.com/maps?q=' + ${escuela.location.latitude} + ',' + ${escuela.location.longitude}" 
                               target="_blank" class="btn btn-sm btn-outline-danger">
                                Ver Mapa
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
