<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ups! Algo ha salido mal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; display: flex; align-items: center; height: 100vh; }
        .error-container { max-width: 500px; margin: auto; text-align: center; }
        .error-code { font-size: 6rem; font-weight: bold; color: #dc3545; }
    </style>
</head>
<body>

    <div class="error-container shadow-lg p-5 bg-white rounded">
        <div class="error-code" th:text="${status}">500</div>
        <h2 class="mb-4">¡Vaya! Tenemos un problema</h2>
        
        <p class="text-muted">
            Lo sentimos, pero ha ocurrido un error inesperado al intentar acceder a la información de las escuelas.
        </p>

        <!-- Información técnica (opcional, útil para desarrollo) -->
        <div class="alert alert-secondary text-start small mt-4" th:if="${error}">
            <strong>Error:</strong> <span th:text="${error}">Error name</span><br>
            <strong>Mensaje:</strong> <span th:text="${message}">Error message</span>
        </div>

        <div class="mt-4">
            <a href="/web/escuelas" class="btn btn-primary px-4">Volver al listado</a>
        </div>
    </div>

</body>
</html>
